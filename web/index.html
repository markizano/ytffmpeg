<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ytffmpeg - Video Upload</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <h1>ytffmpeg</h1>
        <ul>
            <li><a href="/" class="active">Upload Video</a></li>
            <li><a href="/videos">Projects</a></li>
        </ul>
    </nav>

    <main>
        <h2>Upload Video for Processing</h2>

        <form id="upload-form">
            <!-- Project Configuration -->
            <fieldset>
                <legend>Project Details</legend>

                <div class="form-group">
                    <label for="project-name">Project Name *</label>
                    <input
                        type="text"
                        id="project-name"
                        name="project_name"
                        required
                        placeholder="my-video-project">
                    <small>Used as directory name in workspace</small>
                </div>

                <div class="form-group">
                    <label for="title">Video Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="My Awesome Video">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        rows="4"
                        placeholder="Video description..."></textarea>
                </div>
            </fieldset>

            <!-- Video Files -->
            <fieldset>
                <legend>Video Files</legend>

                <div id="video-inputs">
                    <div class="video-input">
                        <div class="form-group">
                            <label>Video File *</label>
                            <input type="file" name="video" accept="video/*" required>
                        </div>
                        <div class="form-group">
                            <label>Override Filename (optional)</label>
                            <input type="text" placeholder="custom-name.mp4">
                        </div>
                    </div>
                </div>

                <button type="button" id="add-video" class="btn-secondary">+ Add Another Video</button>
                <small>For concatenation, add multiple videos</small>
            </fieldset>

            <!-- Processing Options -->
            <fieldset>
                <legend>Processing Options</legend>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="subtitles" name="subtitles" checked>
                        Generate Subtitles
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="cut-silence" name="cut_silence" checked="checked">
                        Remove Silence
                    </label>
                </div>
            </fieldset>

            <!-- Submit -->
            <div class="form-actions">
                <button type="submit" id="submit-btn" class="btn-primary">Upload and Process</button>
                <button type="reset" class="btn-secondary">Reset Form</button>
            </div>
        </form>

        <!-- Progress Indicator -->
        <div id="progress-container" style="display:none;">
            <h3>Upload Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="progress-text">Uploading: 0%</p>
        </div>

        <!-- Status Messages -->
        <div id="status-message" style="display:none;"></div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
